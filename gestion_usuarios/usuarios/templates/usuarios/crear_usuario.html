{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Usuario</title>
    <link rel="stylesheet" href="{% static 'usuarios/css/crear_usuario.css' %}"/>
</head>
<body>
    <h1>Crear Usuario</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Guardar Usuario</button>
    </form>
    <a href="{% url 'lista_usuarios' %}">Volver a la lista de usuarios</a>
</body>
</html>
