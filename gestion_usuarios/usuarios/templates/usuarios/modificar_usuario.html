{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>

    <title>Modificar Usuario</title>
    <link rel="stylesheet" href="{% static 'usuarios/css/modificar_usuario.css' %}"/>
</head>
<body>
    <h1>Modificar Usuario</h1>

    <a href="{% url 'lista_usuarios' %}">Volver a la lista de usuarios</a>
</body>
</html>
