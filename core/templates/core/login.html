{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistema de Imprenta Digital</title>
    {# Enlaza tu archivo CSS #}
    <link rel="stylesheet" href="{% static 'styile.css' %}">
    <style>
        /* Mueve solo esta parte de CSS si quieres que solo aplique aquí.
           O puedes moverla al archivo style.css si es global */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div class="login-box"> {# Cambié la clase a login-box #}
        <h2>Iniciar Sesión</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Iniciar Sesión</button>
        </form>
    </div>
</body>
</html>
