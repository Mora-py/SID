{% extends "base.html" %}
{% load static %}

{% block content %}
<a class="btn" href="{% url 'nota_credito' %}">Volver a Notas de Crédito</a> 
<h1>Crear Nota de Crédito</h1>
<form method="POST" action="{% url 'crear-nota-credito' %}">
    {% csrf_token %}
    <label for="numero_nota">Número de Nota de Crédito:</label>
    <input type="text" id="numero_nota" value="(Se generará automáticamente)" readonly>
    {{ form.as_p }}

    <h3>Conceptos de Crédito</h3>
    <div id="formset">
        {{ formset.management_form }}
        {% for form in formset %}
            <div class="concepto-form">
                {{ form.as_p }}
            </div>
        {% endfor %}
    </div>
    <button type="button" id="add-concepto">Añadir otro concepto</button>
    <button type="submit">Crear Nota de Crédito</button>
</form>

<script>
    document.getElementById('add-concepto').onclick = function() {
        var formsetDiv = document.getElementById('formset');
        var totalForms = document.querySelector('[name$="-TOTAL_FORMS"]');
        var currentFormCount = parseInt(totalForms.value);
        var emptyFormHtml = `{{ formset.empty_form.as_p|escapejs }}`;
        var newFormHtml = emptyFormHtml.replace(/__prefix__/g, currentFormCount);
        var div = document.createElement('div');
        div.classList.add('concepto-form');
        div.innerHTML = newFormHtml;
        formsetDiv.appendChild(div);
        totalForms.value = currentFormCount + 1;
    };
</script>
{% endblock %}
