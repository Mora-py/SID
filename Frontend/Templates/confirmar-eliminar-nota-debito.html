{% extends "base.html" %}
{% block content %}
<h2>Confirmar eliminación de Nota de Débito</h2>
<p>¿Está seguro que desea eliminar la nota <strong>{{ nota.numero_nota }}</strong>? Esta acción no se puede deshacer.</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
    <a href="{% url 'nota_debito' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
